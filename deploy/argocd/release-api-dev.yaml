apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: release-api-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/spillala/k8s-release-demo.git
    targetRevision: main
    path: deploy/helm/release-api
    helm:
      valueFiles:
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
